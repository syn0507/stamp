
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#map{width:100%;height:300px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);overflow:hidden;}
.panel{padding:10px 0;}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:10px;}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:9px 12px;}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;}
.stat-val{font-size:18px;font-weight:500;color:var(--color-text-primary);}
.filter-bar{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:10px;}
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.filter-row:last-child{margin-bottom:0;}
.filter-label{font-size:12px;color:var(--color-text-secondary);width:90px;flex-shrink:0;}
.filter-val{font-size:12px;font-weight:500;color:var(--color-text-primary);width:36px;text-align:right;}
input[type=range]{flex:1;}
.stamp-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:10px;}
.stamp-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:9px 11px;display:flex;align-items:center;gap:8px;}
.stamp-card.got{border-color:#3B6D11;background:#EAF3DE;}
.stamp-icon{width:32px;height:32px;border-radius:50%;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stamp-card.got .stamp-icon{background:#C0DD97;}
.stamp-name{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.3;}
.stamp-dist{font-size:11px;color:var(--color-text-secondary);margin-top:1px;}
.stamp-card.got .stamp-dist{color:#3B6D11;}
.buf-indicator{display:flex;gap:3px;margin-bottom:10px;align-items:center;}
.buf-dot{width:10px;height:10px;border-radius:50%;background:var(--color-border-tertiary);}
.buf-dot.filled{background:#639922;}
.buf-label{font-size:11px;color:var(--color-text-secondary);margin-left:4px;}
.msg{font-size:12px;color:var(--color-text-secondary);text-align:center;padding:6px 0 4px;}
.btn-row{display:flex;gap:8px;margin-top:4px;}
button{flex:1;padding:8px;font-size:13px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer;}
button:hover{background:var(--color-background-secondary);}
button.primary{background:#639922;border-color:#3B6D11;color:#fff;}
button.primary:hover{background:#3B6D11;}
.toast{position:absolute;left:50%;transform:translateX(-50%);top:10px;background:#27500A;color:#EAF3DE;font-size:13px;font-weight:500;padding:8px 18px;border-radius:99px;display:none;z-index:9999;white-space:nowrap;}
.toast.show{display:block;}
.complete-banner{background:#EAF3DE;border:0.5px solid #3B6D11;border-radius:var(--border-radius-lg);padding:12px;text-align:center;margin-bottom:10px;}
.complete-banner p{font-size:12px;color:#27500A;margin-top:3px;}
</style>

<div style="position:relative;">
<div class="toast" id="toast"></div>
<div id="map"></div>
<div class="panel">

<div class="stats">
  <div class="stat"><div class="stat-label">スタンプ獲得</div><div class="stat-val" id="got-count">0 / 5</div></div>
  <div class="stat"><div class="stat-label">平均後の精度</div><div class="stat-val" id="accuracy">--</div></div>
</div>

<div class="filter-bar">
  <div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;">位置フィルター設定</div>
  <div class="filter-row">
    <span class="filter-label">平均サンプル数</span>
    <input type="range" id="buf-size" min="2" max="10" step="1" value="5">
    <span class="filter-val" id="buf-size-out">5</span>
  </div>
  <div class="filter-row">
    <span class="filter-label">精度しきい値</span>
    <input type="range" id="acc-thresh" min="10" max="200" step="10" value="80">
    <span class="filter-val" id="acc-thresh-out">80m</span>
  </div>
  <div class="filter-row">
    <span class="filter-label">判定距離</span>
    <input type="range" id="stamp-r" min="30" max="200" step="10" value="80">
    <span class="filter-val" id="stamp-r-out">80m</span>
  </div>
</div>

<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
  <span style="font-size:11px;color:var(--color-text-secondary);">バッファ:</span>
  <div class="buf-indicator" id="buf-indicator"></div>
  <span class="buf-label" id="buf-label">0/5 サンプル蓄積中</span>
</div>

<div class="stamp-row" id="stamp-list"></div>
<div id="complete-area"></div>
<div class="msg" id="status-msg">「開始」ボタンを押してスタート</div>
<div class="btn-row">
  <button class="primary" id="locate-btn" onclick="startLocate()">開始</button>
  <button onclick="resetGame()">リセット</button>
</div>
</div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const STAMPS_TEMPLATE = [
  {id:0,name:"北の広場",offsetLat:0.0008,offsetLng:0.0000,got:false},
  {id:1,name:"東の公園",offsetLat:0.0000,offsetLng:0.0010,got:false},
  {id:2,name:"南のベンチ",offsetLat:-0.0008,offsetLng:0.0003,got:false},
  {id:3,name:"西の角",offsetLat:0.0003,offsetLng:-0.0010,got:false},
  {id:4,name:"中心の泉",offsetLat:0.0000,offsetLng:0.0000,got:false},
];

let stamps=JSON.parse(JSON.stringify(STAMPS_TEMPLATE));
let map,userMarker,userCircle,avgMarker,stampMarkers=[],watchId=null;
let posBuffer=[];
let smoothLat=null,smoothLng=null,smoothAcc=null;

function getBufSize(){return parseInt(document.getElementById('buf-size').value);}
function getAccThresh(){return parseInt(document.getElementById('acc-thresh').value);}
function getStampR(){return parseInt(document.getElementById('stamp-r').value);}

document.getElementById('buf-size').addEventListener('input',function(){
  document.getElementById('buf-size-out').textContent=this.value;
  posBuffer=[];renderBufIndicator();
});
document.getElementById('acc-thresh').addEventListener('input',function(){
  document.getElementById('acc-thresh-out').textContent=this.value+'m';
  posBuffer=[];renderBufIndicator();
});
document.getElementById('stamp-r').addEventListener('input',function(){
  document.getElementById('stamp-r-out').textContent=this.value+'m';
});

function initMap(lat,lng){
  if(map)return;
  map=L.map('map',{zoomControl:true,attributionControl:false}).setView([lat,lng],17);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  stamps.forEach(s=>{
    const slat=lat+s.offsetLat, slng=lng+s.offsetLng;
    s.lat=slat;s.lng=slng;
    const m=L.circleMarker([slat,slng],{radius:10,color:'#639922',fillColor:'#C0DD97',fillOpacity:1,weight:2}).addTo(map).bindPopup(s.name);
    stampMarkers.push(m);
  });
}

function addToBuffer(lat,lng,acc){
  const thresh=getAccThresh();
  if(acc>thresh){
    document.getElementById('status-msg').textContent='精度が低いためスキップ（'+Math.round(acc)+'m > しきい値'+thresh+'m）';
    return;
  }
  const bufSize=getBufSize();
  posBuffer.push({lat,lng,acc});
  if(posBuffer.length>bufSize) posBuffer.shift();
  renderBufIndicator();
  if(posBuffer.length>=bufSize){
    computeSmoothed();
  } else {
    document.getElementById('status-msg').textContent='サンプル蓄積中... ('+posBuffer.length+'/'+bufSize+')';
  }
}

function computeSmoothed(){
  const n=posBuffer.length;
  const weights=posBuffer.map(p=>1/(p.acc||1));
  const wSum=weights.reduce((a,b)=>a+b,0);
  smoothLat=posBuffer.reduce((s,p,i)=>s+p.lat*weights[i],0)/wSum;
  smoothLng=posBuffer.reduce((s,p,i)=>s+p.lng*weights[i],0)/wSum;
  smoothAcc=posBuffer.reduce((s,p)=>s+p.acc,0)/n;
  updateMap();
  checkStamps(smoothLat,smoothLng);
}

function updateMap(){
  if(!map)return;
  const lat=smoothLat,lng=smoothLng,acc=smoothAcc;
  document.getElementById('accuracy').textContent=Math.round(acc)+'m';
  if(!userMarker){
    userMarker=L.circleMarker([lat,lng],{radius:8,color:'#185FA5',fillColor:'#378ADD',fillOpacity:1,weight:2}).addTo(map).bindPopup('生のGPS点');
    userCircle=L.circle([lat,lng],{radius:acc,color:'#378ADD',fillColor:'#378ADD',fillOpacity:0.1,weight:1}).addTo(map);
    avgMarker=L.circleMarker([lat,lng],{radius:7,color:'#854F0B',fillColor:'#EF9F27',fillOpacity:1,weight:2}).addTo(map).bindPopup('平均位置（精度向上後）');
  } else {
    userMarker.setLatLng([lat,lng]);
    userCircle.setLatLng([lat,lng]).setRadius(acc);
    avgMarker.setLatLng([lat,lng]);
  }
  posBuffer.forEach((p,i)=>{
    if(!p._marker){
      p._marker=L.circleMarker([p.lat,p.lng],{radius:4,color:'#878',fillColor:'#aaa',fillOpacity:0.5,weight:1}).addTo(map);
    } else {
      p._marker.setLatLng([p.lat,p.lng]);
    }
  });
  map.panTo([lat,lng]);
  renderStamps();
  document.getElementById('status-msg').textContent=getBufSize()+'点の平均で安定化中';
}

function haversine(a,b,c,d){
  const R=6371000,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function checkStamps(lat,lng){
  let changed=false;
  stamps.forEach((s,i)=>{
    if(s.got||!s.lat)return;
    if(haversine(lat,lng,s.lat,s.lng)<=getStampR()){
      s.got=true;changed=true;
      stampMarkers[i].setStyle({color:'#27500A',fillColor:'#639922'});
      showToast(s.name+' のスタンプをゲット！');
    }
  });
  if(changed)renderStamps();
}

function renderBufIndicator(){
  const bufSize=getBufSize();
  const n=posBuffer.length;
  const ind=document.getElementById('buf-indicator');
  ind.innerHTML='';
  for(let i=0;i<bufSize;i++){
    const d=document.createElement('div');
    d.className='buf-dot'+(i<n?' filled':'');
    ind.appendChild(d);
  }
  document.getElementById('buf-label').textContent=n+'/'+bufSize+' サンプル蓄積中';
}

function renderStamps(){
  const list=document.getElementById('stamp-list');
  const gotN=stamps.filter(s=>s.got).length;
  document.getElementById('got-count').textContent=gotN+' / '+stamps.length;
  list.innerHTML='';
  stamps.forEach(s=>{
    const d=(smoothLat&&s.lat)?Math.round(haversine(smoothLat,smoothLng,s.lat,s.lng)):null;
    const el=document.createElement('div');
    el.className='stamp-card'+(s.got?' got':'');
    el.innerHTML=`<div class="stamp-icon">${s.got?'<svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 8l4 4 8-8" stroke="#3B6D11" stroke-width="2" fill="none" stroke-linecap="round"/></svg>':'<svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" stroke="#888780" stroke-width="1.5" fill="none"/></svg>'}</div><div><div class="stamp-name">${s.name}</div><div class="stamp-dist">${s.got?'獲得済み':d!==null?d+'m先':'--'}</div></div>`;
    list.appendChild(el);
  });
  const ca=document.getElementById('complete-area');
  if(gotN===stamps.length){
    ca.innerHTML='<div class="complete-banner"><div style="font-size:15px;font-weight:500;color:#27500A;">全スタンプ制覇！</div><p>おめでとうございます！</p></div>';
  } else {
    ca.innerHTML='';
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function startLocate(){
  if(!navigator.geolocation){document.getElementById('status-msg').textContent='位置情報が使えません';return;}
  document.getElementById('locate-btn').textContent='追跡中...';
  if(watchId)navigator.geolocation.clearWatch(watchId);
  posBuffer=[];renderBufIndicator();
  watchId=navigator.geolocation.watchPosition(pos=>{
    const {latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
    if(!map)initMap(lat,lng);
    addToBuffer(lat,lng,acc);
  },err=>{
    document.getElementById('status-msg').textContent='取得失敗: '+err.message;
  },{enableHighAccuracy:true,maximumAge:0,timeout:15000});
}

function resetGame(){
  stamps=JSON.parse(JSON.stringify(STAMPS_TEMPLATE));
  posBuffer=[];smoothLat=null;smoothLng=null;smoothAcc=null;
  stampMarkers.forEach((m,i)=>m.setStyle({color:'#639922',fillColor:'#C0DD97'}));
  if(avgMarker){avgMarker.setLatLng([0,0]);}
  renderBufIndicator();
  renderStamps();
  document.getElementById('complete-area').innerHTML='';
  document.getElementById('status-msg').textContent='「開始」ボタンを押してスタート';
  document.getElementById('accuracy').textContent='--';
  document.getElementById('locate-btn').textContent='開始';
}

renderBufIndicator();
renderStamps();
</script>
